###############################################################################
# ZOLVE Worker — infra local
# Sobe apenas os serviços que o worker precisa para rodar localmente.
# Não inclui API, BFF, Kong, Keycloak nem Redis (worker não usa cache).
#
# Uso:
#   make infra        → sobe postgres, mongo, rabbitmq e mailpit
#   make infra-down   → para e remove os containers
###############################################################################

name: zolve-worker

services:

  database_postgres:
    image: postgres:16
    container_name: worker_database_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zolve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zolve123}
      POSTGRES_DB: ${POSTGRES_DB:-zolve}
    ports:
      - "5432:5432"
    volumes:
      - database_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zolve}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  database_mongo:
    image: mongo:7
    container_name: worker_database_mongo
    ports:
      - "27017:27017"
    volumes:
      - database_mongo_data:/data/db
    restart: unless-stopped

  queue_rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: worker_queue_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-zolve}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-zolve123}
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI → http://localhost:15672
    volumes:
      - queue_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Captura e-mails localmente sem enviar — UI em http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: worker_mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web
    restart: unless-stopped

volumes:
  database_postgres_data:
  database_mongo_data:
  queue_rabbitmq_data:
